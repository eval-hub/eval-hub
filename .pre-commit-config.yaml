repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
        exclude: ^docs/.*\.(html|json)$
      - id: end-of-file-fixer
        exclude: ^docs/.*\.(html|json)$
      - id: check-yaml
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: check-toml
      - id: check-json
      - id: detect-private-key

  - repo: https://github.com/dnephin/pre-commit-golang
    rev: v0.5.1
    hooks:
      - id: go-fmt
      - id: go-imports

  - repo: https://github.com/golangci/golangci-lint
    rev: v1.55.2
    hooks:
      - id: golangci-lint
        args: ['--fix']

  - repo: https://github.com/dnephin/pre-commit-golang
    rev: v0.5.1
    hooks:
      - id: go-vet
      - id: go-unit-tests

  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v3.0.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]

  # Local checks
  - repo: local
    hooks:
      - id: mypy-check
        name: mypy type checking
        #  run with uv
        entry: uv
        args: [run, mypy, --exclude, "python-server/(build|setup\\.py)", python-server/]
        language: system
        types: [python]
        pass_filenames: false
        files: ^python-server/

      - id: pytest-unit
        name: unit tests
        entry: bash
        args: [-c, 'if [ -d python-server/tests ]; then uv run pytest python-server/tests/ -m "unit" --tb=short -q; else echo "Skipping: python-server/tests/ not found"; fi']
        language: system
        types: [python]
        pass_filenames: false
        files: ^python-server/

      - id: go-test
        name: go unit and integration tests
        entry: make
        args: [test, test-fvt]
        language: system
        types: [go]
        pass_filenames: false
