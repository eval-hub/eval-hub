get:
  tags:
    - Collections
  summary: Get Collection
  description: Get details of a specific collection.
  operationId: get_collections_id
  parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        title: Collection Id
  responses:
    '200':
      description: Successful Response
      content:
        application/json:
          schema:
            $ref: ../components/schemas/CollectionResource.yaml
          examples:
            response:
              summary: A single collection resource
              value:
                resource:
                  id: "col-safety-001"
                  tenant: "default"
                  created_at: "2025-12-01T10:00:00Z"
                  updated_at: "2025-12-15T14:00:00Z"
                name: "standard-safety-collection"
                category: "safety"
                description: "Standard safety evaluation benchmarks"
                tags:
                  - safety
                  - standard
                pass_criteria:
                  threshold: 0.7
                benchmarks:
                  - id: "toxicity"
                    provider_id: "garak"
                    weight: 1.0
                    primary_score:
                      metric: "accuracy"
                      lower_is_better: false
                  - id: "bias-detection"
                    provider_id: "garak"
                    weight: 0.5
                    primary_score:
                      metric: "accuracy"
                      lower_is_better: false
    '400':
      $ref: ../components/responses/BadRequest.yaml
    '401':
      $ref: ../components/responses/Unauthorized.yaml
    '403':
      $ref: ../components/responses/Forbidden.yaml
    '404':
      $ref: ../components/responses/NotFound.yaml
put:
  tags:
    - Collections
  summary: Update Collection
  description: Update an existing collection.
  operationId: put_collections_id
  parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        title: Collection Id
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../components/schemas/CollectionConfig.yaml
        examples:
          request:
            summary: Update an existing collection
            value:
              name: "standard-safety-collection"
              category: "safety"
              description: "Updated standard safety evaluation benchmarks"
              tags:
                - safety
                - standard
                - updated
              pass_criteria:
                threshold: 0.75
              benchmarks:
                - id: "toxicity"
                  provider_id: "garak"
                  weight: 1.0
                  primary_score:
                    metric: "accuracy"
                    lower_is_better: false
                  pass_criteria:
                    threshold: 0.9
                - id: "bias-detection"
                  provider_id: "garak"
                  weight: 0.5
                - id: "hallucination"
                  provider_id: "garak"
                  weight: 0.8
  responses:
    '200':
      description: Successful Response
      content:
        application/json:
          schema:
            $ref: ../components/schemas/CollectionResource.yaml
          examples:
            response:
              summary: Updated collection resource
              value:
                resource:
                  id: "col-safety-001"
                  tenant: "default"
                  created_at: "2025-12-01T10:00:00Z"
                  updated_at: "2026-02-10T11:00:00Z"
                name: "standard-safety-collection"
                category: "safety"
                description: "Updated standard safety evaluation benchmarks"
                tags:
                  - safety
                  - standard
                  - updated
                pass_criteria:
                  threshold: 0.75
                benchmarks:
                  - id: "toxicity"
                    provider_id: "garak"
                    weight: 1.0
                    primary_score:
                      metric: "accuracy"
                      lower_is_better: false
                    pass_criteria:
                      threshold: 0.9
                  - id: "bias-detection"
                    provider_id: "garak"
                    weight: 0.5
                  - id: "hallucination"
                    provider_id: "garak"
                    weight: 0.8
    '400':
      $ref: ../components/responses/BadRequest.yaml
    '401':
      $ref: ../components/responses/Unauthorized.yaml
    '403':
      $ref: ../components/responses/Forbidden.yaml
    '404':
      $ref: ../components/responses/NotFound.yaml
patch:
  tags:
    - Collections
  summary: Patch Collection
  description: Partially update an existing collection.
  operationId: patch_collections_id
  parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        title: Collection Id
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: array
          title: Json Patch
          description: JSON Patch operation
          items:
            $ref: ../components/schemas/PatchOperation.yaml
        examples:
          request:
            summary: Patch a collection's description and pass criteria
            value:
              - op: "replace"
                path: "/description"
                value: "Patched collection description"
              - op: "replace"
                path: "/pass_criteria/threshold"
                value: 0.85
  responses:
    '200':
      description: Successful Response
      content:
        application/json:
          schema:
            $ref: ../components/schemas/CollectionResource.yaml
          examples:
            response:
              summary: Patched collection resource
              value:
                resource:
                  id: "col-safety-001"
                  tenant: "default"
                  created_at: "2025-12-01T10:00:00Z"
                  updated_at: "2026-02-10T12:00:00Z"
                name: "standard-safety-collection"
                category: "safety"
                description: "Patched collection description"
                tags:
                  - safety
                  - standard
                pass_criteria:
                  threshold: 0.85
                benchmarks:
                  - id: "toxicity"
                    provider_id: "garak"
                    weight: 1.0
                    primary_score:
                      metric: "accuracy"
                      lower_is_better: false
                  - id: "bias-detection"
                    provider_id: "garak"
                    weight: 0.5
    '400':
      $ref: ../components/responses/BadRequest.yaml
    '401':
      $ref: ../components/responses/Unauthorized.yaml
    '403':
      $ref: ../components/responses/Forbidden.yaml
    '404':
      $ref: ../components/responses/NotFound.yaml
delete:
  tags:
    - Collections
  summary: Delete Collection
  description: Delete a collection.
  operationId: delete_collections_id
  parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        title: Collection Id
  responses:
    '204':
      description: Success
    '400':
      $ref: ../components/responses/BadRequest.yaml
    '401':
      $ref: ../components/responses/Unauthorized.yaml
    '403':
      $ref: ../components/responses/Forbidden.yaml
    '404':
      $ref: ../components/responses/NotFound.yaml
