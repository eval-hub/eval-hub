get:
  tags:
    - Providers
  summary: Get Provider
  description: Get a provider by ID.
  operationId: get_providers_id
  parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        description: Provider ID
        title: Provider Id
      description: Provider ID
  responses:
    '200':
      description: Successful Response
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ProviderResource.yaml
          examples:
            response:
              summary: Garak vulnerability scanning provider
              value:
                resource:
                  id: "d8e9f0a1-2345-6789-cdef-012345678901"
                  tenant: "default"
                  created_at: "2025-10-01T00:00:00Z"
                  updated_at: "2025-10-01T00:00:00Z"
                name: "garak"
                title: "Garak"
                description: "LLM vulnerability scanner and red-teaming framework"
                tags:
                  - security
                  - red_team
                runtime:
                  k8s:
                    image: "quay.io/trustyai/trustyai-garak-lls-provider-dsp:latest"
                    entrypoint:
                      - "python"
                      - "-m"
                      - "llama_stack_provider_trustyai_garak.evalhub"
                    cpu_request: "500m"
                    memory_request: "512Mi"
                    cpu_limit: "2000m"
                    memory_limit: "4Gi"
                benchmarks:
                  - id: "owasp_llm_top10"
                    name: "OWASP LLM top 10 risk scan"
                    description: "Tests against the top 10 security risks specific to LLM applications."
                    category: "security"
                    metrics:
                      - attack_success_rate
                    tags:
                      - security
                      - owasp
                      - red_team
                    primary_score:
                      metric: "attack_success_rate"
                      lower_is_better: true
                    pass_criteria:
                      threshold: 0.3
                  - id: "quality"
                    name: "Toxic & harmful content scan"
                    description: "Scans for violence, profanity, toxicity, hate speech, and integrity issues."
                    category: "safety"
                    metrics:
                      - attack_success_rate
                    tags:
                      - safety
                      - quality
                      - toxicity
                      - red_team
                    primary_score:
                      metric: "attack_success_rate"
                      lower_is_better: true
                    pass_criteria:
                      threshold: 0.3
    '400':
      $ref: ../components/responses/BadRequest.yaml
    '401':
      $ref: ../components/responses/Unauthorized.yaml
    '403':
      $ref: ../components/responses/Forbidden.yaml
    '404':
      $ref: ../components/responses/NotFound.yaml
put:
  tags:
    - Providers
  summary: Update Provider
  description: Update an existing provider.
  operationId: put_providers_id
  parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        description: Provider ID
        title: Provider Id
      description: Provider ID
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../components/schemas/ProviderConfig.yaml
        examples:
          request:
            summary: Update an existing provider
            value:
              name: "garak"
              title: "Garak Safety Evaluator (Updated)"
              description: "Updated LLM safety and vulnerability scanning provider"
              tags:
                - safety
                - llm
                - updated
              runtime:
                k8s:
                  image: "quay.io/evalhub/garak-adapter:v2.0"
                  entrypoint:
                    - "/usr/bin/garak-adapter"
                  cpu_request: "1"
                  memory_request: "2Gi"
                  cpu_limit: "4"
                  memory_limit: "8Gi"
              benchmarks:
                - id: "toxicity"
                  name: "Toxicity Detection"
                  description: "Measures model toxicity in generated content"
                  category: "safety"
                  metrics:
                    - accuracy
                    - f1_score
                  primary_score:
                    metric: "accuracy"
                    lower_is_better: false
  responses:
    '200':
      description: Successful Response
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ProviderResource.yaml
          examples:
            response:
              summary: Updated provider resource
              value:
                resource:
                  id: "prov-garak-001"
                  tenant: "default"
                  created_at: "2025-11-01T08:00:00Z"
                  updated_at: "2026-01-20T14:00:00Z"
                name: "garak"
                title: "Garak Safety Evaluator (Updated)"
                description: "Updated LLM safety and vulnerability scanning provider"
                tags:
                  - safety
                  - llm
                  - updated
                runtime:
                  k8s:
                    image: "quay.io/evalhub/garak-adapter:v2.0"
                    entrypoint:
                      - "/usr/bin/garak-adapter"
                    cpu_request: "1"
                    memory_request: "2Gi"
                    cpu_limit: "4"
                    memory_limit: "8Gi"
                benchmarks:
                  - id: "toxicity"
                    name: "Toxicity Detection"
                    description: "Measures model toxicity in generated content"
                    category: "safety"
                    metrics:
                      - accuracy
                      - f1_score
                    primary_score:
                      metric: "accuracy"
                      lower_is_better: false
    '400':
      $ref: ../components/responses/BadRequest.yaml
    '401':
      $ref: ../components/responses/Unauthorized.yaml
    '403':
      $ref: ../components/responses/Forbidden.yaml
    '404':
      $ref: ../components/responses/NotFound.yaml
patch:
  tags:
    - Providers
  summary: Patch Provider
  description: Partially update an existing provider.
  operationId: patch_providers_id
  parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        title: Provider Id
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: array
          title: Json Patch
          description: JSON Patch operation
          items:
            $ref: ../components/schemas/PatchOperation.yaml
        examples:
          request:
            summary: Patch a provider description and tags
            value:
              - op: "replace"
                path: "/description"
                value: "Updated provider description"
              - op: "add"
                path: "/tags/-"
                value: "patched"
  responses:
    '200':
      description: Successful Response
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ProviderResource.yaml
          examples:
            response:
              summary: Patched provider resource
              value:
                resource:
                  id: "prov-garak-001"
                  tenant: "default"
                  created_at: "2025-11-01T08:00:00Z"
                  updated_at: "2026-01-20T15:00:00Z"
                name: "garak"
                title: "Garak Safety Evaluator"
                description: "Updated provider description"
                tags:
                  - safety
                  - llm
                  - patched
                runtime:
                  k8s:
                    image: "quay.io/evalhub/garak-adapter:latest"
                    entrypoint:
                      - "/usr/bin/garak-adapter"
                    cpu_request: "500m"
                    memory_request: "1Gi"
                    cpu_limit: "2"
                    memory_limit: "4Gi"
                benchmarks:
                  - id: "toxicity"
                    name: "Toxicity Detection"
                    description: "Measures model toxicity in generated content"
                    category: "safety"
                    metrics:
                      - accuracy
                      - f1_score
                    primary_score:
                      metric: "accuracy"
                      lower_is_better: false
    '400':
      $ref: ../components/responses/BadRequest.yaml
    '401':
      $ref: ../components/responses/Unauthorized.yaml
    '403':
      $ref: ../components/responses/Forbidden.yaml
    '404':
      $ref: ../components/responses/NotFound.yaml

delete:
  tags:
    - Providers
  summary: Delete Provider
  description: Delete provider by ID.
  operationId: delete_providers_id
  parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        description: Provider ID
        title: Provider Id
      description: Provider ID
  responses:
    '204':
      description: Successful Response
    '400':
      $ref: ../components/responses/BadRequest.yaml
    '401':
      $ref: ../components/responses/Unauthorized.yaml
    '403':
      $ref: ../components/responses/Forbidden.yaml
    '404':
      $ref: ../components/responses/NotFound.yaml
