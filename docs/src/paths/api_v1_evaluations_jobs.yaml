post:
  tags:
    - Evaluations
  summary: Create Evaluation
  description: Create and execute evaluation request using the simplified benchmark schema.
  operationId: post_evaluations_jobs
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../components/schemas/EvaluationJobConfig.yaml
        examples:
          CreateEvaluationWithBenchmarks:
            summary: Create an evaluation with inline benchmarks
            value:
              name: "my-model-safety-eval"
              description: "Safety evaluation for my-model v2"
              tags:
                - safety
                - v2
              model:
                url: "https://my-model-server.example.com/v1"
                name: "my-model-v2"
              benchmarks:
                - id: "toxicity"
                  provider_id: "garak"
                  weight: 1.0
                - id: "bias-detection"
                  provider_id: "garak"
                  weight: 0.5
              pass_criteria:
                threshold: 0.7
          CreateEvaluationWithCollection:
            summary: Create an evaluation using a collection
            value:
              name: "my-model-full-eval"
              description: "Full evaluation using the standard safety collection"
              tags:
                - safety
                - production
              model:
                url: "https://my-model-server.example.com/v1"
                name: "my-model-v2"
              collection:
                id: "standard-safety-collection"
  responses:
    '202':
      description: Successful Response
      content:
        application/json:
          schema:
            $ref: ../components/schemas/EvaluationJobResource.yaml
          examples:
            response:
              summary: Evaluation job created and queued
              value:
                resource:
                  id: "f02b16a2-1990-4626-b24d-1cff3febdbfb"
                  tenant: "default"
                  created_at: "2026-01-12T10:00:00Z"
                  updated_at: "2026-01-12T10:00:00Z"
                  owner: "user@example.com"
                status:
                  state: "pending"
                  message:
                    message: "Evaluation job is queued for execution."
                    message_code: "job_pending"
                name: "my-model-safety-eval"
                description: "Safety evaluation for my-model v2"
                tags:
                  - safety
                  - v2
                model:
                  url: "https://my-model-server.example.com/v1"
                  name: "my-model-v2"
                benchmarks:
                  - id: "toxicity"
                    provider_id: "garak"
                    weight: 1.0
                  - id: "bias-detection"
                    provider_id: "garak"
                    weight: 0.5
                pass_criteria:
                  threshold: 0.7
    '400':
      $ref: ../components/responses/BadRequest.yaml
    '401':
      $ref: ../components/responses/Unauthorized.yaml
    '403':
      $ref: ../components/responses/Forbidden.yaml
    '404':
      $ref: ../components/responses/NotFound.yaml
get:
  tags:
    - Evaluations
  summary: List Evaluations
  description: List all evaluation requests.
  operationId: get_evaluations_jobs
  parameters:
    - name: limit
      in: query
      required: false
      schema:
        type: integer
        maximum: 100
        minimum: 1
        description: Maximum number of evaluations to return
        default: 50
        title: Limit
      description: Maximum number of evaluations to return
    - name: offset
      in: query
      required: false
      schema:
        type: integer
        minimum: 0
        description: Offset for pagination
        default: 0
        title: Offset
      description: Offset for pagination
    - name: status
      in: query
      required: false
      schema:
        type: string
        description: Filter by status
        title: Status Filter
      description: Filter by status
    - name: name
      in: query
      required: false
      schema:
        type: string
        title: Name
      description: Name to search for
    - name: tags
      in: query
      required: false
      schema:
        type: string
        title: Tags
      description: Tags to search for
  responses:
    '200':
      description: Successful Response
      content:
        application/json:
          schema:
            $ref: ../components/schemas/EvaluationJobResourceList.yaml
          examples:
            response:
              summary: A paginated list of evaluation jobs
              value:
                first:
                  href: "/api/v1/evaluations/jobs?limit=50&offset=0"
                next:
                  href: "/api/v1/evaluations/jobs?limit=50&offset=50"
                limit: 50
                total_count: 120
                items:
                  - resource:
                      id: "f02b16a2-1990-4626-b24d-1cff3febdbfb"
                      tenant: "default"
                      created_at: "2026-01-12T10:00:00Z"
                      updated_at: "2026-01-12T10:47:12Z"
                      owner: "user@example.com"
                    status:
                      state: "completed"
                      message:
                        message: "Evaluation job completed successfully."
                        message_code: "job_completed"
                    results:
                      benchmarks:
                        - id: "toxicity"
                          provider_id: "garak"
                          benchmark_index: 0
                          metrics:
                            accuracy: 0.95
                          test:
                            primary_score: 0.95
                            threshold: 0.7
                            pass: true
                      test:
                        score: 0.95
                        threshold: 0.7
                        pass: true
                    name: "my-model-safety-eval"
                    model:
                      url: "https://my-model-server.example.com/v1"
                      name: "my-model-v2"
                    benchmarks:
                      - id: "toxicity"
                        provider_id: "garak"
                        weight: 1.0
                    pass_criteria:
                      threshold: 0.7
    '400':
      $ref: ../components/responses/BadRequest.yaml
    '401':
      $ref: ../components/responses/Unauthorized.yaml
    '403':
      $ref: ../components/responses/Forbidden.yaml
    '404':
      $ref: ../components/responses/NotFound.yaml
