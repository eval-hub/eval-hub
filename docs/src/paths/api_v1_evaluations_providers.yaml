get:
  tags:
    - Providers
  summary: List Providers
  description: List all registered evaluation providers.
  operationId: list_providers
  parameters:
    - name: limit
      in: query
      required: false
      schema:
        type: integer
        maximum: 100
        minimum: 1
        description: Maximum number of providers to return
        default: 50
        title: Limit
      description: Maximum number of providers to return
    - name: offset
      in: query
      required: false
      schema:
        type: integer
        minimum: 0
        description: Offset for pagination
        default: 0
        title: Offset
      description: Offset for pagination
    - name: benchmarks
      in: query
      required: false
      schema:
        type: boolean
        default: true
        description: Set to false to not include benchmarks supported by this provider in the response
        title: Benchmarks
      description: Include or exclude benchmarks supported by this provider in the response
    - name: name
      in: query
      required: false
      schema:
        type: string
        title: Name
      description: Name to search for
    - name: tags
      in: query
      required: false
      schema:
        type: string
        title: Tags
      description: Tags to search for
    - name: scope
      in: query
      required: false
      schema:
        type: string
        enum:
          - system
          - tenant
        title: Scope of providers
      description: >
        Set to `system` to get only system defined providers, or `tenant` to get only user defined providers.
        If `scope` is not provided, both system and user defined providers will be returned.
  responses:
    '200':
      description: Successful Response
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ProviderResourceList.yaml
          examples:
            response:
              summary: A paginated list of providers
              value:
                first:
                  href: "/api/v1/evaluations/providers?limit=50&offset=0"
                limit: 50
                total_count: 2
                items:
                  - resource:
                      id: "prov-garak-001"
                      tenant: "default"
                      created_at: "2025-11-01T08:00:00Z"
                      updated_at: "2025-11-15T12:30:00Z"
                    name: "garak"
                    title: "Garak Safety Evaluator"
                    description: "LLM safety and vulnerability scanning"
                    tags:
                      - safety
                      - llm
                    runtime:
                      k8s:
                        image: "quay.io/evalhub/garak-adapter:latest"
                        entrypoint:
                          - "/usr/bin/garak-adapter"
                        cpu_request: "500m"
                        memory_request: "1Gi"
                        cpu_limit: "2"
                        memory_limit: "4Gi"
                    benchmarks:
                      - id: "toxicity"
                        name: "Toxicity Detection"
                        description: "Measures model toxicity in generated content"
                        category: "safety"
                        metrics:
                          - accuracy
                          - f1_score
                        primary_score:
                          metric: "accuracy"
                          lower_is_better: false
    '400':
      $ref: ../components/responses/BadRequest.yaml
    '401':
      $ref: ../components/responses/Unauthorized.yaml
    '403':
      $ref: ../components/responses/Forbidden.yaml
    '404':
      $ref: ../components/responses/NotFound.yaml
post:
  tags:
    - Providers
  summary: Create a new provider scoped to the current tenant (Bring Your Own Provider)
  description: Create a new provider scoped to the current tenant (Bring Your Own Provider)
  operationId: post_providers
  requestBody:
    content:
      application/json:
        schema:
          $ref: ../components/schemas/ProviderConfig.yaml
        examples:
          request:
            summary: Create a custom evaluation provider
            value:
              name: "custom-eval-provider"
              title: "Custom Evaluation Provider"
              description: "A custom provider for internal model evaluation"
              tags:
                - custom
                - internal
              runtime:
                k8s:
                  image: "quay.io/myorg/custom-adapter:v1.0"
                  entrypoint:
                    - "/usr/bin/custom-adapter"
                  cpu_request: "250m"
                  memory_request: "512Mi"
                  cpu_limit: "1"
                  memory_limit: "2Gi"
              benchmarks:
                - id: "custom-bench-1"
                  name: "Custom Benchmark"
                  description: "Evaluates custom metrics"
                  category: "custom"
                  metrics:
                    - custom_score
                  primary_score:
                    metric: "custom_score"
                    lower_is_better: false
    required: true
  responses:
    '201':
      description: Successful Response
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ProviderResource.yaml
          examples:
            response:
              summary: Newly created provider resource
              value:
                resource:
                  id: "prov-custom-001"
                  tenant: "default"
                  created_at: "2026-01-15T09:00:00Z"
                  updated_at: "2026-01-15T09:00:00Z"
                  owner: "user@example.com"
                name: "custom-eval-provider"
                title: "Custom Evaluation Provider"
                description: "A custom provider for internal model evaluation"
                tags:
                  - custom
                  - internal
                runtime:
                  k8s:
                    image: "quay.io/myorg/custom-adapter:v1.0"
                    entrypoint:
                      - "/usr/bin/custom-adapter"
                    cpu_request: "250m"
                    memory_request: "512Mi"
                    cpu_limit: "1"
                    memory_limit: "2Gi"
                benchmarks:
                  - id: "custom-bench-1"
                    name: "Custom Benchmark"
                    description: "Evaluates custom metrics"
                    category: "custom"
                    metrics:
                      - custom_score
                    primary_score:
                      metric: "custom_score"
                      lower_is_better: false
    '400':
      $ref: ../components/responses/BadRequest.yaml
    '401':
      $ref: ../components/responses/Unauthorized.yaml
    '403':
      $ref: ../components/responses/Forbidden.yaml
    '404':
      $ref: ../components/responses/NotFound.yaml
