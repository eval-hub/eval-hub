get:
  summary: Health Check
  description: |
    Health check endpoint suitable for liveness and readiness probes.
    Does not require identity headers. Build and version metadata are not
    included; those will be exposed via a future `/api/v1/version` API.
  operationId: get_health
  tags:
    - Health
  responses:
    '200':
      description: Successful Response
      content:
        application/json:
          schema:
            $ref: ../components/schemas/HealthResponse.yaml
          examples:
            healthy:
              summary: Healthy service response
              value:
                status: healthy
                timestamp: '2026-05-27T18:42:11Z'
    '405':
      $ref: ../components/responses/MethodNotAllowed.yaml
