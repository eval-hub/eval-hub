get:
  tags:
    - Collections
  summary: List Collections
  description: List all benchmark collections.
  operationId: get_collections
  parameters:
    - name: limit
      in: query
      required: false
      schema:
        type: integer
        maximum: 100
        minimum: 1
        description: Maximum number of collections to return
        default: 50
        title: Limit
      description: Maximum number of collections to return
    - name: offset
      in: query
      required: false
      schema:
        type: integer
        minimum: 0
        description: Offset for pagination
        default: 0
        title: Offset
      description: Offset for pagination
    - name: name
      in: query
      required: false
      schema:
        type: string
        title: Name
      description: Name to search for
    - name: category
      in: query
      required: false
      schema:
        type: string
        title: Category
      description: Category to search for
    - name: tags
      in: query
      required: false
      schema:
        type: string
        title: Tags
      description: Tags to search for
    - name: scope
      in: query
      required: false
      schema:
        type: string
        enum:
          - system
          - tenant
        title: Scope of collections
      description: >
        Set to `system` to get only system defined collections, or `tenant` to get only user defined collections.
        If `scope` is not provided, both system and user defined collections will be returned.
  responses:
    '200':
      description: Successful Response
      content:
        application/json:
          schema:
            $ref: ../components/schemas/CollectionResourceList.yaml
          examples:
            response:
              summary: A paginated list of benchmark collections
              value:
                first:
                  href: "/api/v1/evaluations/collections?limit=50&offset=0"
                limit: 50
                total_count: 2
                items:
                  - resource:
                      id: "col-safety-001"
                      tenant: "default"
                      created_at: "2025-12-01T10:00:00Z"
                      updated_at: "2025-12-15T14:00:00Z"
                    name: "standard-safety-collection"
                    category: "safety"
                    description: "Standard safety evaluation benchmarks"
                    tags:
                      - safety
                      - standard
                    pass_criteria:
                      threshold: 0.7
                    benchmarks:
                      - id: "toxicity"
                        provider_id: "garak"
                        weight: 1.0
                        primary_score:
                          metric: "accuracy"
                          lower_is_better: false
                      - id: "bias-detection"
                        provider_id: "garak"
                        weight: 0.5
                        primary_score:
                          metric: "accuracy"
                          lower_is_better: false
    '400':
      $ref: ../components/responses/BadRequest.yaml
    '401':
      $ref: ../components/responses/Unauthorized.yaml
    '403':
      $ref: ../components/responses/Forbidden.yaml
    '404':
      $ref: ../components/responses/NotFound.yaml
post:
  tags:
    - Collections
  summary: Create Collection
  description: Create a new collection.
  operationId: post_collections
  requestBody:
    content:
      application/json:
        schema:
          $ref: ../components/schemas/CollectionConfig.yaml
        examples:
          request:
            summary: Create a new benchmark collection
            value:
              name: "custom-safety-collection"
              category: "safety"
              description: "Custom safety evaluation benchmarks for production models"
              tags:
                - safety
                - production
              pass_criteria:
                threshold: 0.8
              benchmarks:
                - id: "toxicity"
                  provider_id: "garak"
                  weight: 1.0
                  primary_score:
                    metric: "accuracy"
                    lower_is_better: false
                  pass_criteria:
                    threshold: 0.9
                - id: "bias-detection"
                  provider_id: "garak"
                  weight: 0.5
    required: true
  responses:
    '201':
      description: Successful Response
      content:
        application/json:
          schema:
            $ref: ../components/schemas/CollectionResource.yaml
          examples:
            response:
              summary: Newly created collection resource
              value:
                resource:
                  id: "col-custom-001"
                  tenant: "default"
                  created_at: "2026-02-01T09:00:00Z"
                  updated_at: "2026-02-01T09:00:00Z"
                  owner: "user@example.com"
                name: "custom-safety-collection"
                category: "safety"
                description: "Custom safety evaluation benchmarks for production models"
                tags:
                  - safety
                  - production
                pass_criteria:
                  threshold: 0.8
                benchmarks:
                  - id: "toxicity"
                    provider_id: "garak"
                    weight: 1.0
                    primary_score:
                      metric: "accuracy"
                      lower_is_better: false
                    pass_criteria:
                      threshold: 0.9
                  - id: "bias-detection"
                    provider_id: "garak"
                    weight: 0.5
    '400':
      $ref: ../components/responses/BadRequest.yaml
    '401':
      $ref: ../components/responses/Unauthorized.yaml
    '403':
      $ref: ../components/responses/Forbidden.yaml
    '404':
      $ref: ../components/responses/NotFound.yaml
