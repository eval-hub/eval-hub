type: object
description: >
  Information related to a job that should be displayed to the user.
  These messages are typically used to provide additional context or information about the job
  and not meant to indicate the status of the job.
required:
  - type
  - message
properties:
  type:
    type: string
    enum:
      - info
      - warning
  message:
    type: string
    description: Message to display to the user.
