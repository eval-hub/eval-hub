type: object
description: |
  Log output for one benchmark workload stream.

  **Kubernetes runtime:** one stream per benchmark from the adapter container.
  `pod` is the Kubernetes pod name; `container` is always `adapter`.

  **Local runtime:** one stream per benchmark, read from the local `jobrun.log` file
  (`/tmp/evalhub-jobs/{job_id}/{benchmark_index}/{provider_id}/{benchmark_id}/jobrun.log`).
  `pod` and `container` are always present with synthetic values (`pod` =
  `{job_id}-{benchmark_index}`, `container` = `local`) so clients can use the same
  response shape in both runtimes.
properties:
  benchmark_index:
    type: integer
    description: Benchmark index in the evaluation job request
  benchmark_id:
    type: string
    description: Benchmark ID
  provider_id:
    type: string
    description: Provider ID
  pod:
    type: string
    description: |
      Kubernetes pod name in cluster mode. In local mode, a synthetic stream
      identifier `{job_id}-{benchmark_index}` (not a Kubernetes pod).
  container:
    type: string
    description: |
      Container name within the pod in cluster mode; always `adapter`. In local
      mode, always `local` (the captured subprocess log file, not a container).
  truncated:
    type: boolean
    description: Whether the log content was truncated by server limits
  byte_count:
    type: integer
    description: Number of bytes returned in content
  content:
    type: string
    description: |
      Log text. Kubernetes runtime returns container stdout/stderr. Local runtime
      returns the contents of `jobrun.log`.
  error:
    type: string
    description: Error message when log retrieval failed for this stream
