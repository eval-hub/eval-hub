type: object
description: Workload logs for a single benchmark within an evaluation job
allOf:
  - $ref: ./EvaluationJobLogs.yaml
  - type: object
    required:
      - benchmark_index
    properties:
      benchmark_index:
        type: integer
        description: Benchmark index from the request path; always present in this response
      streams:
        type: array
        maxItems: 1
        items:
          $ref: ./LogStream.yaml
        description: |
          Log stream for this benchmark. At most one adapter container stream.
          Empty when no logs could be retrieved.
