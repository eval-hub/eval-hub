type: object
description: Results section for an evaluation job
properties:
  benchmarks:
    type: array
    items:
      $ref: ./BenchmarkResult.yaml
    description: Per-benchmark results
  mlflow_experiment_url:
    type: string
    description: URL to MLFlow experiment
  test:
    $ref: ./EvaluationTest.yaml
    description: Test result
  eval_card:
    type: object
    description: >-
      Persisted evaluation card JSON. Included only when the query parameter
      `include=eval_card` is set on `GET /api/v1/evaluations/jobs/{id}`.
    additionalProperties: true
