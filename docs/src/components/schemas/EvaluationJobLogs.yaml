type: object
description: Workload logs for an evaluation job
required:
  - job_id
  - available
  - streams
properties:
  job_id:
    type: string
    description: Evaluation job ID
  benchmark_index:
    type: integer
    description: Omitted when logs are returned for all benchmarks (`GET .../jobs/{id}/logs`)
  available:
    type: boolean
    description: Whether any workload logs could be retrieved
  message:
    type: string
    description: Human-readable detail when logs are unavailable or partially available
  streams:
    type: array
    items:
      $ref: ./LogStream.yaml
    description: |
      Log streams for the job. Kubernetes runtimes return one or more streams per
      benchmark (per container). Local runtimes return one stream per benchmark
      from `jobrun.log`.
