id: lm_evaluation_harness
name: LM Evaluation Harness
title: LM Evaluation Harness
description: >
  Comprehensive evaluation framework for language models with 180 benchmarks

runtime:
  k8s:
    image: quay.io/opendatahub/ta-lmes-job:odh-3.4-ea2
    entrypoint:
      - /opt/app-root/bin/python
      - /opt/app-root/src/main.py
    cpu_request: 100m
    memory_request: 128Mi
    cpu_limit: 500m
    memory_limit: 1Gi
    env:
      - name: VAR_NAME
        value: VALUE
  local:
    # command is set to true for test-fvt-server-coverage as it runs in local mode.
    # In actual custom provider configurations, it will be set to the actual command to run.
    command: "true"
benchmarks:
  - id: arc_easy
    name: "Basic Science Q&A"
    description: |-
      Grade-school science questions testing basic reasoning and scientific knowledge (AI2 Reasoning Challenge, easy split).
    category: reasoning
    metrics:
      - accuracy
      - acc_norm
    num_few_shot: 0
    dataset_size: 2376
    tags:
      - reasoning
      - science
      - lm_eval
  - id: AraDiCE_boolq_lev
    name: Yes/No Question Answering (Levantine Arabic)
    description: Boolean question answering in Levantine Arabic dialect.
    category: general
    metrics:
      - accuracy
    num_few_shot: 0
    dataset_size: 3270
    tags:
      - general
      - lm_eval
  - id: blimp
    name: "Grammar & Syntax Judgment"
    description: |-
      Tests whether models distinguish grammatical from ungrammatical sentences across syntax, morphology, and semantics.
    category: general
