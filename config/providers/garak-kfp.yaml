id: garak-kfp
name: Garak KFP
title: Garak KFP
description: LLM vulnerability scanner and red-teaming framework with KFP execution mode
runtime:
  k8s:
    image: quay.io/trustyai/trustyai-garak-lls-provider-dsp:latest
    entrypoint:
      - python
      - -m
      - llama_stack_provider_trustyai_garak.evalhub.kfp_adapter
    cpu_request: 100m
    memory_request: 128Mi
    cpu_limit: 500m
    memory_limit: 1Gi
    env:
      - name: KUBEFLOW_GARAK_BASE_IMAGE
        value: quay.io/trustyai/trustyai-garak-lls-provider-dsp:latest
  local:
    # command is set to true for test-fvt-server-coverage as it runs in local mode.
    # In actual custom provider configurations, it will be set to the actual command to run.
    command: "true"
benchmarks:
  - id: intents
    name: Context-aware vulnerability scan
    description: Probes for vulnerabilities using context-aware intent detection with KFP execution.
    category: security
    metrics:
      - attack_success_rate
    tags:
      - security
      - intents
      - red_team
  - id: owasp_llm_top10
    name: OWASP LLM top 10 risk scan
    description: Tests against the top 10 security risks specific to LLM applications (prompt injection, data leakage, etc.).
    category: security
    metrics:
      - attack_success_rate
    tags:
      - security
      - owasp
      - red_team
  - id: avid
    name: Full AI vulnerability scan
    description: Comprehensive scan across all security, ethics, and performance categories from the AVID taxonomy.
    category: security
    metrics:
      - attack_success_rate
    tags:
      - security
      - avid
      - red_team
  - id: avid_security
    name: AI security vulnerability scan
    description: Probes for security-specific vulnerabilities (data poisoning, model theft, evasion attacks).
    category: security
    metrics:
      - attack_success_rate
    tags:
      - security
      - avid
      - red_team
  - id: avid_ethics
    name: AI ethics & bias scan
    description: Probes for ethical concerns including bias, fairness, and harmful content generation.
    category: safety
    metrics:
      - attack_success_rate
    tags:
      - safety
      - ethics
      - avid
      - red_team
  - id: avid_performance
    name: AI performance degradation scan
    description: Tests for performance issues like hallucination under load, context window failures, and degradation.
    category: performance
    metrics:
      - attack_success_rate
    tags:
      - performance
      - avid
      - red_team
  - id: quality
    name: Toxic & harmful content scan
    description: Scans for violence, profanity, toxicity, hate speech, and content integrity issues.
    category: safety
    metrics:
      - attack_success_rate
    tags:
      - safety
      - quality
      - toxicity
      - red_team
  - id: cwe
    name: Software weakness exploitation scan
    description: Tests whether the model can be used to exploit Common Weakness Enumeration software vulnerabilities.
    category: security
    metrics:
      - attack_success_rate
    tags:
      - security
      - cwe
      - red_team
  - id: quick
    name: Quick security smoke test
    description: Single-probe rapid scan for quick validation that basic safeguards are working.
    category: security
    metrics:
      - attack_success_rate
    tags:
      - security
      - quick
      - red_team
